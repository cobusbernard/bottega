name: Deploy

# Build + push the image, then deploy it to the homelab Nomad cluster.
#
# Two environments off one pipeline, chosen by the ref that triggered the run:
#   - semver tag (v1.2.3)  -> PROD: bottega.cobus.dev, namespace prod, volume bottega
#   - push to main         -> DEV:  bottega-dev.cobus.dev, namespace dev,  volume bottega-dev
#
# Fork / PR safety: no pull_request trigger, and the job pins to this exact repo,
# so neither a PR nor a fork can ever build or deploy.
on:
  push:
    branches: [main]
    tags: ['v[0-9]+.[0-9]+.[0-9]+']

permissions:
  contents: read
  packages: write

concurrency:
  # Serialize per ref; a newer push to the same ref cancels an in-flight deploy.
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/cobusbernard/bottega

jobs:
  deploy:
    if: github.repository == 'cobusbernard/bottega'
    runs-on: [self-hosted, homelab]

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      # Map the triggering ref -> environment. GITHUB_REF is a trusted,
      # GitHub-controlled value (not user input), so it's safe in run:.
      - name: Resolve environment
        id: env
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "namespace=prod"                  >> "$GITHUB_OUTPUT"
            echo "instance=bottega"                >> "$GITHUB_OUTPUT"
            echo "app_host=bottega.cobus.dev"      >> "$GITHUB_OUTPUT"
          else
            echo "namespace=dev"                   >> "$GITHUB_OUTPUT"
            echo "instance=bottega-dev"            >> "$GITHUB_OUTPUT"
            echo "app_host=bottega-dev.cobus.dev"  >> "$GITHUB_OUTPUT"
          fi

      # No setup-buildx-action: the self-hosted runner already has docker buildx.
      # Builds use the default docker driver; its daemon-side layer cache is
      # reused across runs, so no explicit cache-from/to is needed.

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The jobspec pins the image by git SHA (immutable). On a semver tag we also
      # publish :<version> and :latest for humans. The unit suite runs INSIDE the
      # Docker build (reference/Dockerfile), so a red test fails the build here and
      # nothing is pushed or deployed.
      - name: Image tags & labels
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5.10.0
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build, test & push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6.19.2
        with:
          context: reference
          file: reference/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # Deploy the just-built image (pinned by SHA) to the resolved environment.
      # Values flow through env: so no untrusted data is interpolated into the
      # command line. Ensure the secrets have been added in Vault via:
        # vault kv put secret/bottega/app jwt_secret=<openssl rand -hex 64> github_webhook_secret=<secret
        # vault kv put secret/bottega-dev/app jwt_secret=<openssl rand -hex 64> github_webhook_secret=<secret

      - name: Deploy to Nomad
        env:
          NOMAD_ADDR: ${{ vars.NOMAD_ADDR }}       # repo/org variable
          NOMAD_TOKEN: ${{ secrets.NOMAD_TOKEN }}  # repo/org secret
          NOMAD_NAMESPACE: ${{ steps.env.outputs.namespace }}
          IMAGE_TAG: ${{ github.sha }}
          INSTANCE: ${{ steps.env.outputs.instance }}
          APP_HOST: ${{ steps.env.outputs.app_host }}
        run: |
          nomad job run \
            -var "image_tag=${IMAGE_TAG}" \
            -var "instance=${INSTANCE}" \
            -var "app_host=${APP_HOST}" \
            nomad/jobspec.hcl
