name: Deploy

# Build + push the image, then deploy it to the homelab Nomad cluster.
#
# Two environments off one pipeline, chosen by the ref that triggered the run:
#   - semver tag (v1.2.3)  -> PROD: bottega.cobus.dev, namespace prod, volume bottega
#   - push to main         -> DEV:  bottega-dev.cobus.dev, namespace dev,  volume bottega-dev
#
# Tests are NOT re-run here and the image no longer self-tests: the `test` job
# reuses .github/workflows/unit-tests.yml and `deploy` needs it, so a red suite
# blocks the build/push/deploy entirely.
#
# Fork / PR safety: no pull_request trigger, and both jobs pin to this exact
# repo, so neither a PR nor a fork can ever build or deploy.
on:
  push:
    branches: [main]
    tags: ['v[0-9]+.[0-9]+.[0-9]+']

permissions:
  contents: read
  packages: write

concurrency:
  # Serialize per ref; a newer push to the same ref cancels an in-flight deploy.
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/cobusbernard/bottega

jobs:
  # Quality gate. Reuses the standalone unit-test workflow; `deploy` needs it,
  # so nothing is built, pushed, or deployed unless the unit suite is green.
  test:
    if: github.repository == 'cobusbernard/bottega'
    uses: ./.github/workflows/unit-tests.yml

  deploy:
    needs: test
    if: github.repository == 'cobusbernard/bottega'
    runs-on: [self-hosted, homelab]

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7.0.0

      # Map the triggering ref -> environment. GITHUB_REF is a trusted,
      # GitHub-controlled value (not user input), so it's safe in run:.
      - name: Resolve environment
        id: env
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "namespace=prod"                  >> "$GITHUB_OUTPUT"
            echo "instance=bottega"                >> "$GITHUB_OUTPUT"
            echo "app_host=bottega.cobus.dev"      >> "$GITHUB_OUTPUT"
          else
            echo "namespace=dev"                   >> "$GITHUB_OUTPUT"
            echo "instance=bottega-dev"            >> "$GITHUB_OUTPUT"
            echo "app_host=bottega-dev.cobus.dev"  >> "$GITHUB_OUTPUT"
          fi

      # Raw docker instead of the docker/* actions: the self-hosted runner
      # already has docker and reuses its daemon-side layer cache across runs, so
      # the actions' buildx GHA cache buys nothing here. Trade-off vs the actions
      # is no auto-generated OCI labels — we re-add image.source by hand so the
      # GHCR package stays linked to this repo.
      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
        run: echo "$GHCR_TOKEN" | docker login ghcr.io -u "$ACTOR" --password-stdin

      # Always tag the immutable git SHA (the tag the Nomad jobspec pins). On a
      # semver tag push, also publish :<version> and :latest for humans.
      - name: Build & push image
        env:
          SHA: ${{ github.sha }}
          REF: ${{ github.ref }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          docker build \
            --label "org.opencontainers.image.source=https://github.com/${REPO}" \
            --label "org.opencontainers.image.revision=${SHA}" \
            -t "${IMAGE}:${SHA}" \
            -f reference/Dockerfile reference
          docker push "${IMAGE}:${SHA}"
          if [[ "${REF}" == refs/tags/v* ]]; then
            VERSION="${REF#refs/tags/}"
            docker tag "${IMAGE}:${SHA}" "${IMAGE}:${VERSION}"
            docker tag "${IMAGE}:${SHA}" "${IMAGE}:latest"
            docker push "${IMAGE}:${VERSION}"
            docker push "${IMAGE}:latest"
          fi

      # Deploy the just-built image (pinned by SHA) to the resolved environment.
      # Values flow through env: so no untrusted data is interpolated into the
      # command line. Ensure the secrets have been added in Vault via:
        # vault kv put secret/bottega/app jwt_secret=<openssl rand -hex 64> github_webhook_secret=<secret
        # vault kv put secret/bottega-dev/app jwt_secret=<openssl rand -hex 64> github_webhook_secret=<secret
      - name: Deploy to Nomad
        env:
          NOMAD_ADDR: ${{ vars.NOMAD_ADDR }}       # repo/org variable
          NOMAD_TOKEN: ${{ secrets.NOMAD_TOKEN }}  # repo/org secret
          NOMAD_NAMESPACE: ${{ steps.env.outputs.namespace }}
          IMAGE_TAG: ${{ github.sha }}
          INSTANCE: ${{ steps.env.outputs.instance }}
          APP_HOST: ${{ steps.env.outputs.app_host }}
        run: |
          nomad job run \
            -var "image_tag=${IMAGE_TAG}" \
            -var "instance=${INSTANCE}" \
            -var "app_host=${APP_HOST}" \
            nomad/jobspec.hcl
