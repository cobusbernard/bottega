name: Unit Tests

on:
  pull_request:
    branches: [main]
  # Called by deploy.yml as its gating test job on push to main / version tags.
  # No standalone push trigger: main-branch test runs happen via that reuse, so
  # the suite isn't run twice on every push.
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest

    # The app lives in reference/ (the repo root holds SPEC.md + workflows).
    # Run all pnpm steps from there.
    defaults:
      run:
        working-directory: reference

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
        with:
          package_json_file: reference/package.json

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # actions/setup-node@v6.4.0
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: reference/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test:run
